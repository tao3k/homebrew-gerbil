name: brew pr-pull

on:
  workflow_dispatch:
    inputs:
      pull_request:
        description: Pull request number
        required: true
      head_sha:
        description: Expected pull request head commit SHA
        required: true
      verification_run_id:
        description: Successful verify bottle capability workflow run
        required: true

jobs:
  pr-pull:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: write
      issues: read
      pull-requests: write
    steps:
      - name: Require a successful bottle capability receipt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ inputs.head_sha }}
          REPOSITORY: ${{ github.repository }}
          VERIFICATION_RUN_ID: ${{ inputs.verification_run_id }}
        run: |
          conclusion="$(gh api "repos/${REPOSITORY}/actions/runs/${VERIFICATION_RUN_ID}" --jq .conclusion)"
          workflow_name="$(gh api "repos/${REPOSITORY}/actions/runs/${VERIFICATION_RUN_ID}" --jq .name)"
          artifact_count="$(gh api "repos/${REPOSITORY}/actions/runs/${VERIFICATION_RUN_ID}/artifacts" \
            --jq '[.artifacts[] | select(.name == "verified_bottles_ubuntu-latest" and .expired == false)] | length')"
          receipt_artifact_count="$(gh api "repos/${REPOSITORY}/actions/runs/${VERIFICATION_RUN_ID}/artifacts" \
            --jq '[.artifacts[] | select((.name | startswith("gerbil-bottle-capability-receipt_ubuntu-latest_")) and .expired == false)] | length')"
          if [[ "$workflow_name" != "verify bottle capability" ||
                "$conclusion" != "success" ||
                "$artifact_count" != "1" ||
                "$receipt_artifact_count" != "1" ]]; then
            echo "verification run ${VERIFICATION_RUN_ID} is not a matching promoted bottle run" >&2
            exit 1
          fi

          receipt_dir="$RUNNER_TEMP/bottle-capability-receipt"
          gh run download "$VERIFICATION_RUN_ID" \
            --repo "$REPOSITORY" \
            --pattern 'gerbil-bottle-capability-receipt_ubuntu-latest_*' \
            --dir "$receipt_dir"
          mapfile -t receipt_files < <(find "$receipt_dir" -type f -name '*.json')
          if (( ${#receipt_files[@]} != 1 )); then
            echo "expected exactly one bottle capability receipt" >&2
            exit 1
          fi

          receipt="${receipt_files[0]}"
          if [[ "$(jq -r .schema "$receipt")" != "homebrew.gerbil.bottle-capability-receipt.v1" ||
                "$(jq -r .currentHeadSha "$receipt")" != "$HEAD_SHA" ||
                "$(jq -r .installStatus "$receipt")" != "0" ||
                "$(jq -r .verificationStatus "$receipt")" != "0" ||
                "$(jq -r .formulaSha256 "$receipt")" != "$(jq -r .embeddedFormulaSha256 "$receipt")" ]]; then
            echo "verification receipt does not authorize head ${HEAD_SHA}" >&2
            exit 1
          fi

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@18fcb8e3e06b4247c676c506750dc95ea7226479 # 2026.07.13.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@18fcb8e3e06b4247c676c506750dc95ea7226479 # 2026.07.13.1

      - name: Pull bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ inputs.head_sha }}
          PULL_REQUEST: ${{ inputs.pull_request }}
        run: >-
          brew pr-pull --debug
          --tap="$GITHUB_REPOSITORY"
          --head-sha="$HEAD_SHA"
          --workflows=bottle-performance.yml
          --artifact-pattern=verified_bottles_ubuntu-latest
          "$PULL_REQUEST"

      - name: Push commits
        uses: Homebrew/actions/git-try-push@18fcb8e3e06b4247c676c506750dc95ea7226479 # 2026.07.13.1
        with:
          branch: main
